<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>GPS LOGGER</title>
</head>

<body>

<h1>GPS LOGGER</h1>

<button onclick="start()">START</button>
<button onclick="saveCSV()">SAVE CSV</button>

<div id="log"></div>

<script>

let records = [];

function log(text) {
  document.getElementById("log").innerHTML += "<p>" + text + "</p>";
}

function start() {

  log("tracking started");

  navigator.geolocation.watchPosition(

    function(pos) {

      const time = new Date().toISOString();

      const lat = pos.coords.latitude;
      const lon = pos.coords.longitude;
      const speed = pos.coords.speed;

      records.push({
        time,
        lat,
        lon,
        speed
      });

      log(
        time +
        " LAT:" + lat +
        " LON:" + lon +
        " SPD:" + speed
      );

    },

    function(err) {
      log("ERROR: " + err.message);
    },

    {
      enableHighAccuracy: true,
      maximumAge: 0,
      timeout: 10000
    }

  );

}

function saveCSV() {

  let csv =
    "time,lat,lon,speed\n";

  records.forEach(r => {

    csv +=
      r.time + "," +
      r.lat + "," +
      r.lon + "," +
      r.speed + "\n";

  });

  const blob =
    new Blob([csv], { type: "text/csv" });

  const url =
    URL.createObjectURL(blob);

  const a =
    document.createElement("a");

  a.href = url;

  a.download = "gps_log.csv";

  a.click();

  URL.revokeObjectURL(url);

  log("CSV saved");

}

</script>

</body>
</html>
