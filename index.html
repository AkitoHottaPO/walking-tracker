<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>tracker</title>
</head>
<body>

<h1>GPS Test</h1>

<button onclick="start()">START</button>

<script>

function start() {

  navigator.geolocation.watchPosition(pos => {

    console.log(pos.coords.latitude);
    console.log(pos.coords.longitude);

    document.body.innerHTML +=
      "<p>" +
      pos.coords.latitude +
      "," +
      pos.coords.longitude +
      "</p>";

  });

}

</script>

</body>
</html>
